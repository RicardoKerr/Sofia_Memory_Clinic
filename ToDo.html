<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia — ToDo List Interativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --color-bg: #0F172A;
            --color-card: #1E293B;
            --color-primary: #10B981;
            --color-secondary: #0284C7;
            --color-text-main: #F8FAFC;
            --color-text-muted: #94A3B8;
            --color-border: #334155;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 20px;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 34px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            font-size: 15px;
            color: var(--color-text-muted);
            margin-top: 8px;
        }
        .todo-input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            height: 44px;
            background-color: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: white;
            padding: 0 16px;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        input[type="text"]:focus {
            border-color: var(--color-primary);
        }
        .btn {
            height: 44px;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .filter-btn {
            background-color: var(--color-card);
            border: 1px solid var(--color-border);
            color: var(--color-text-muted);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .filter-btn.active {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }
        .todo-list {
            background-color: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--color-border);
            transition: background-color 0.2s;
        }
        .todo-item:last-child {
            border-bottom: none;
        }
        .todo-item:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }
        .todo-left {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            flex: 1;
        }
        .checkbox {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid var(--color-border);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }
        .todo-item.completed .checkbox {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
        }
        .todo-item.completed .checkbox i {
            color: white;
            display: block;
        }
        .checkbox i {
            display: none;
            width: 14px;
            height: 14px;
        }
        .todo-text {
            font-size: 14px;
            transition: all 0.2s;
        }
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--color-text-muted);
        }
        .todo-category {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            background-color: rgba(2, 132, 199, 0.15);
            color: #38BDF8;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #EF4444;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .delete-btn:hover {
            opacity: 1;
        }
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .nav-back:hover {
            color: var(--color-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back">
            <i data-lucide="arrow-left"></i> Voltar para a Aplicação
        </a>
        <header>
            <h1>Sofia — ToDo List Interativo</h1>
            <p class="subtitle">Gerenciamento dinâmico de tarefas e progresso de desenvolvimento</p>
        </header>

        <div class="todo-input-row">
            <input type="text" id="task-input" placeholder="Adicionar nova tarefa...">
            <button class="btn" id="add-btn">
                <i data-lucide="plus"></i> Adicionar
            </button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Todos</button>
            <button class="filter-btn" data-filter="pending">Pendentes</button>
            <button class="filter-btn" data-filter="completed">Concluídos</button>
            <button class="filter-btn" id="reset-todo-btn" style="margin-left: auto; background-color: #FEF2F2; color: #EF4444; border-color: #FCA5A5;">Resetar Padrões</button>
        </div>

        <div class="todo-list" id="todo-list-mount">
            <!-- Populated dynamically by script -->
        </div>
    </div>

    <script>
        const DEFAULT_TASKS = [
            { id: 1, text: "Criar estrutura base index.html com frame móvel", completed: true, category: "Sprint 1" },
            { id: 2, text: "Criar sistema de design (CSS) e resets globais", completed: true, category: "Sprint 1" },
            { id: 3, text: "Lógica de navegação SPA bottom nav-bar", completed: true, category: "Sprint 1" },
            { id: 4, text: "Serviço de banco de dados mockado local em services/api.js", completed: true, category: "Sprint 2" },
            { id: 5, text: "Reconhecimento e Síntese de Voz (Speech APIs) em services/voice.js", completed: true, category: "Sprint 2" },
            { id: 6, text: "Hardware Webcam e fotos via canvas em services/vision.js", completed: true, category: "Sprint 2" },
            { id: 7, text: "Timeline clínica interativa no Diário com filtros", completed: true, category: "Sprint 2" },
            { id: 8, text: "Criar visualizador de ondas sonoras e chat com Sofia", completed: true, category: "Sprint 2" },
            { id: 9, text: "Telas de Ajustes com chaves OpenAI/ElevenLabs", completed: true, category: "Sprint 4" },
            { id: 10, text: "Listas de modelos LLM e vozes configuráveis", completed: true, category: "Sprint 4" },
            { id: 11, text: "Definir os 4 temas de cores em index.css (Dark, Light, Casual, Retro)", completed: true, category: "Sprint 3" },
            { id: 12, text: "Implementar botão global de temas na header em todas as páginas", completed: true, category: "Sprint 3" },
            { id: 13, text: "Criar arquivos de gestão do projeto (arquitetura.html, progress-weeky.html, ToDo.html)", completed: true, category: "Sprint 3" },
            { id: 14, text: "Homologar fluxos de áudio e uploads com investidores", completed: false, category: "Release" }
        ];

        let tasks = [];
        let currentFilter = 'all';

        // Load tasks
        function initTasks() {
            const stored = localStorage.getItem('sofia_todo_tasks');
            if (stored) {
                tasks = JSON.parse(stored);
            } else {
                tasks = [...DEFAULT_TASKS];
                saveTasks();
            }
            renderTasks();
        }

        function saveTasks() {
            localStorage.setItem('sofia_todo_tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            const mount = document.getElementById('todo-list-mount');
            mount.innerHTML = '';

            let filtered = tasks;
            if (currentFilter === 'pending') {
                filtered = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = tasks.filter(t => t.completed);
            }

            if (filtered.length === 0) {
                mount.innerHTML = `
                    <div style="padding: 30px; text-align: center; color: var(--color-text-muted); font-size: 13px;">
                        Nenhuma tarefa nesta lista.
                    </div>
                `;
                return;
            }

            filtered.forEach(task => {
                const item = document.createElement('div');
                item.className = `todo-item ${task.completed ? 'completed' : ''}`;
                item.innerHTML = `
                    <div class="todo-left" data-id="${task.id}">
                        <div class="checkbox">
                            <i data-lucide="check"></i>
                        </div>
                        <span class="todo-text">${task.text}</span>
                        <span class="todo-category">${task.category}</span>
                    </div>
                    <button class="delete-btn" data-id="${task.id}">
                        <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                    </button>
                `;
                mount.appendChild(item);
            });

            if (window.lucide) {
                window.lucide.createIcons();
            }

            // Bind checklist toggling
            mount.querySelectorAll('.todo-left').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.getAttribute('data-id'));
                    const task = tasks.find(t => t.id === id);
                    if (task) {
                        task.completed = !task.completed;
                        saveTasks();
                        renderTasks();
                    }
                });
            });

            // Bind delete button
            mount.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    tasks = tasks.filter(t => t.id !== id);
                    saveTasks();
                    renderTasks();
                });
            });
        }

        // Add task
        document.getElementById('add-btn').addEventListener('click', () => {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            if (text) {
                tasks.push({
                    id: Date.now(),
                    text: text,
                    completed: false,
                    category: "Geral"
                });
                input.value = '';
                saveTasks();
                renderTasks();
            }
        });

        // Filter tabs
        document.querySelectorAll('.filters .filter-btn:not(#reset-todo-btn)').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filters .filter-btn:not(#reset-todo-btn)').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                renderTasks();
            });
        });

        // Reset tasks
        document.getElementById('reset-todo-btn').addEventListener('click', () => {
            if (confirm('Restaurar checklist para o padrão inicial do projeto?')) {
                tasks = [...DEFAULT_TASKS];
                saveTasks();
                renderTasks();
            }
        });

        // Bootstrap
        window.addEventListener('DOMContentLoaded', () => {
            initTasks();
        });
    </script>
</body>
</html>
